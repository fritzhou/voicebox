<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - VoiceBox</title>
<link rel="stylesheet" href="app.css">
</head>
<body>

<div class="page">

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="logo-badge">
          <svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
        </span>
        VoiceBox
      </a>
      <div class="nav-links">
        <a href="index.html"><span class="label">Home</span></a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container narrow center" style="padding-top:56px;">
      <div class="hero-badge small">
        <svg viewBox="0 0 24 24"><path d="M18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10C20,8.9 19.1,8 18,8z M12,17c-1.1,0 -2,-0.9 -2,-2s0.9,-2 2,-2 2,0.9 2,2S13.1,17 12,17z M15.1,8H8.9V6c0,-1.71 1.39,-3.1 3.1,-3.1 1.71,0 3.1,1.39 3.1,3.1V8z"/></svg>
      </div>
      <h1 style="font-size:24px; margin-bottom:8px;">Reset Password</h1>
      <p class="text-secondary" style="margin-bottom:32px;">
        Enter the code we emailed you, and choose a new password.
      </p>

      <form id="resetForm" style="text-align:left;">
        <div class="field">
          <label>6-digit code</label>
          <input type="text" id="inputCode" placeholder="123456" maxlength="8" inputmode="numeric">
          <div class="error-msg">Enter the code from your email.</div>
        </div>

        <div class="field">
          <label>New Password</label>
          <input type="password" id="inputNewPassword" placeholder="At least 6 characters">
          <div class="error-msg">Password must be at least 6 characters.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="btnReset">
          <span class="btn-label">Reset Password</span>
          <span class="spinner"></span>
        </button>
      </form>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email") || "";

  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const code = document.getElementById("inputCode").value.trim();
    const newPassword = document.getElementById("inputNewPassword").value.trim();
    let valid = true;

    if (!code) {
      document.getElementById("inputCode").parentElement.classList.add("has-error");
      valid = false;
    } else {
      document.getElementById("inputCode").parentElement.classList.remove("has-error");
    }

    if (newPassword.length < 6) {
      document.getElementById("inputNewPassword").parentElement.classList.add("has-error");
      valid = false;
    } else {
      document.getElementById("inputNewPassword").parentElement.classList.remove("has-error");
    }

    if (!valid) return;

    const button = document.getElementById("btnReset");
    setButtonLoading(button, true, "Resetting...");

    try {
      const { error: verifyError } = await supabaseClient.auth.verifyOtp({
        email: email,
        token: code,
        type: "recovery"
      });
      if (verifyError) throw verifyError;

      const { error: updateError } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (updateError) throw updateError;

      showToast("Password updated. You're now logged in.");
      setTimeout(() => { window.location.href = "my-submissions.html"; }, 1200);
    } catch (err) {
      setButtonLoading(button, false);
      document.querySelector("#btnReset .btn-label").textContent = "Reset Password";
      showToast(err.message || "Invalid or expired code. Please try again.");
    }
  });
</script>
</body>
</html>
