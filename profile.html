<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account - VoiceBox</title>
<link rel="stylesheet" href="app.css">
<style>
  .profile-header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 0 0 28px 28px;
    padding: 32px 24px 64px;
    text-align: center;
    color: white;
  }
  .profile-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: -48px auto 0;
    box-shadow: var(--shadow-card);
  }
  .profile-avatar svg { width: 44px; height: 44px; fill: var(--primary); }
  .detail-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--light-gray);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row svg { width: 20px; height: 20px; fill: var(--text-secondary); flex-shrink: 0; }
  .detail-row .detail-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
  .detail-row .detail-value { font-size: 15px; font-weight: 700; color: var(--text); }
</style>
</head>
<body>

<div class="page">

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="logo-badge">
          <svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
        </span>
        VoiceBox
      </a>
      <div class="nav-links">
        <a href="index.html"><span class="label">Home</span></a>
        <a href="my-submissions.html"><span class="label">My Submissions</span></a>
        <a href="profile.html" class="active account-link"><span class="label">My Account</span></a>
      </div>
    </div>
  </nav>

  <main>

    <!-- ===== Logged in view ===== -->
    <div id="profileView" style="display:none;">
      <div class="profile-header">
        <h2 style="font-size:18px; color:white;">Profile</h2>
      </div>
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
      </div>

      <div class="container narrow center" style="padding-top:14px;">
        <h1 id="profileName" style="font-size:20px; margin-bottom:16px;"></h1>

        <button class="btn btn-outline" id="btnEditProfile" style="padding:10px 20px; font-size:13px; margin-bottom:28px;">
          Edit Profile
        </button>

        <div class="card" style="text-align:left;">
          <p style="font-size:12px; font-weight:700; color:var(--primary); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:4px;">Account Details</p>

          <div class="detail-row">
            <svg viewBox="0 0 24 24"><path d="M20,4H4c-1.1,0 -1.99,0.9 -1.99,2L2,18c0,1.1 0.9,2 2,2h16c1.1,0 2,-0.9 2,-2V6C22,4.9 21.1,4 20,4z M20,8l-8,5L4,8V6l8,5 8,-5V8z"/></svg>
            <div>
              <div class="detail-label">Email</div>
              <div class="detail-value" id="detailEmail"></div>
            </div>
          </div>

          <div class="detail-row" id="rowStudentNumber" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M6,2c-1.1,0 -1.99,0.9 -1.99,2L4,20c0,1.1 0.89,2 1.99,2H18c1.1,0 2,-0.9 2,-2V8l-6,-6H6z"/></svg>
            <div>
              <div class="detail-label">Student Number</div>
              <div class="detail-value" id="detailStudentNumber"></div>
            </div>
          </div>

          <div class="detail-row" id="rowGradeLevel" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M12,3L1,9l4,2.18v6L12,21l7,-3.82v-6l2,-1.09V17h2V9L12,3z M18.82,9L12,12.72 5.18,9 12,5.28 18.82,9z M17,15.99l-5,2.73 -5,-2.73v-3.72L12,15l5,-2.73V16z"/></svg>
            <div>
              <div class="detail-label">Grade Level</div>
              <div class="detail-value" id="detailGradeLevel"></div>
            </div>
          </div>

          <div class="detail-row" id="rowStrand" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M6,2c-1.1,0 -1.99,0.9 -1.99,2L4,20c0,1.1 0.89,2 1.99,2H18c1.1,0 2,-0.9 2,-2V8l-6,-6H6z"/></svg>
            <div>
              <div class="detail-label">Strand</div>
              <div class="detail-value" id="detailStrand"></div>
            </div>
          </div>
        </div>

        <div class="spacer-md"></div>
        <button class="btn btn-outline btn-block" id="btnLogout" style="color:var(--status-pending);">Log Out</button>
      </div>
    </div>

    <!-- ===== Guest view ===== -->
    <div id="guestView" style="display:none;">
      <div class="profile-header">
        <h2 style="font-size:18px; color:white;">Profile</h2>
      </div>
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24"><path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"/></svg>
      </div>

      <div class="container narrow center" style="padding-top:22px;">
        <h1 style="font-size:20px; margin-bottom:8px;">You're browsing as a guest</h1>
        <p class="text-secondary" style="margin-bottom:28px; padding:0 20px;">
          Log in to submit complaints and suggestions under your name and track their status.
        </p>
        <a href="login.html" class="btn btn-primary btn-block">Log In / Sign Up</a>
      </div>
    </div>

  </main>

  <!-- ===== Edit Profile modal ===== -->
  <div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(37,37,58,0.5); align-items:center; justify-content:center; z-index:100;">
    <div class="card" style="width:90%; max-width:400px;">
      <h2 style="font-size:18px; margin-bottom:18px;">Edit Profile</h2>
      <form id="editForm" style="text-align:left;">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="editName">
        </div>
        <div class="field">
          <label>Student Number</label>
          <input type="text" id="editStudentNumber" placeholder="S24-0083" maxlength="8">
        </div>
        <div class="field">
          <label>Grade Level</label>
          <div style="display:flex; gap:10px;">
            <button type="button" class="btn btn-outline" data-grade="11" onclick="selectEditChip(this,'grade')" style="flex:1;">11</button>
            <button type="button" class="btn btn-outline" data-grade="12" onclick="selectEditChip(this,'grade')" style="flex:1;">12</button>
          </div>
        </div>
        <div class="field">
          <label>Strand</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button type="button" class="btn btn-outline" data-strand="STEM" onclick="selectEditChip(this,'strand')">STEM</button>
            <button type="button" class="btn btn-outline" data-strand="TVL" onclick="selectEditChip(this,'strand')">TVL</button>
            <button type="button" class="btn btn-outline" data-strand="ABM" onclick="selectEditChip(this,'strand')">ABM</button>
            <button type="button" class="btn btn-outline" data-strand="HUMSS" onclick="selectEditChip(this,'strand')">HUMSS</button>
          </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
          <button type="button" class="btn btn-outline" style="flex:1;" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1;" id="btnSaveProfile">
            <span class="btn-label">Save</span>
            <span class="spinner"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  let currentProfile = null;
  let editGrade = null;
  let editStrand = null;

  async function loadProfile() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      document.getElementById("guestView").style.display = "block";
      return;
    }

    document.getElementById("detailEmail").textContent = session.user.email;

    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("full_name, student_id, grade_level, strand")
      .eq("id", session.user.id)
      .single();

    currentProfile = profile;
    document.getElementById("profileName").textContent = (profile && profile.full_name) || "Student";

    if (profile && profile.student_id) {
      document.getElementById("rowStudentNumber").style.display = "flex";
      document.getElementById("detailStudentNumber").textContent = profile.student_id;
    }
    if (profile && profile.grade_level) {
      document.getElementById("rowGradeLevel").style.display = "flex";
      document.getElementById("detailGradeLevel").textContent = profile.grade_level;
    }
    if (profile && profile.strand) {
      document.getElementById("rowStrand").style.display = "flex";
      document.getElementById("detailStrand").textContent = profile.strand;
    }

    document.getElementById("profileView").style.display = "block";
  }

  document.getElementById("btnLogout").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
  });

  document.getElementById("btnEditProfile").addEventListener("click", () => {
    document.getElementById("editName").value = (currentProfile && currentProfile.full_name) || "";
    document.getElementById("editStudentNumber").value = (currentProfile && currentProfile.student_id) || "";
    editGrade = currentProfile ? currentProfile.grade_level : null;
    editStrand = currentProfile ? currentProfile.strand : null;

    document.querySelectorAll("[data-grade]").forEach(el => {
      const match = el.dataset.grade === editGrade;
      el.classList.toggle("btn-primary", match);
      el.classList.toggle("btn-outline", !match);
    });
    document.querySelectorAll("[data-strand]").forEach(el => {
      const match = el.dataset.strand === editStrand;
      el.classList.toggle("btn-primary", match);
      el.classList.toggle("btn-outline", !match);
    });

    document.getElementById("editModal").style.display = "flex";
  });

  function closeEditModal() {
    document.getElementById("editModal").style.display = "none";
  }

  function selectEditChip(button, type) {
    const group = type === "grade" ? "[data-grade]" : "[data-strand]";
    document.querySelectorAll(group).forEach(el => {
      el.classList.remove("btn-primary");
      el.classList.add("btn-outline");
    });
    button.classList.remove("btn-outline");
    button.classList.add("btn-primary");
    if (type === "grade") editGrade = button.dataset.grade;
    if (type === "strand") editStrand = button.dataset.strand;
  }

  document.getElementById("editForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;

    const button = document.getElementById("btnSaveProfile");
    setButtonLoading(button, true, "Saving...");

    try {
      const { error } = await supabaseClient.from("profiles").update({
        full_name: document.getElementById("editName").value.trim(),
        student_id: document.getElementById("editStudentNumber").value.trim(),
        grade_level: editGrade,
        strand: editStrand
      }).eq("id", session.user.id);
      if (error) throw error;

      closeEditModal();
      showToast("Profile updated.");
      loadProfile();
    } catch (err) {
      showToast(err.message || "Failed to update profile.");
    } finally {
      setButtonLoading(button, false);
    }
  });

  loadProfile();
</script>
</body>
</html>
