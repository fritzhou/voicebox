<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - VoiceBox</title>
<link rel="stylesheet" href="app.css">
</head>
<body>

<div class="page">

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="logo-badge">
          <svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
        </span>
        VoiceBox
      </a>
      <div class="nav-links">
        <a href="index.html"><span class="label">Home</span></a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container narrow center" style="padding-top:56px;">
      <div class="hero-badge small">
        <svg viewBox="0 0 24 24"><path d="M12,1L3,5v6c0,5.55 3.84,10.74 9,12c5.16,-1.26 9,-6.45 9,-12V5L12,1z M12,11.99h7c-0.53,4.12 -3.28,7.79 -7,8.94V12H5V6.3l7,-3.11V11.99z"/></svg>
      </div>
      <h1 style="font-size:24px; margin-bottom:8px;">Forgot Password</h1>
      <p class="text-secondary" style="margin-bottom:32px;">
        Enter your email and we'll send you a code to reset your password.
      </p>

      <form id="forgotForm" style="text-align:left;">
        <div class="field">
          <label>Email</label>
          <input type="email" id="inputEmail" placeholder="you@example.com">
          <div class="error-msg">Enter a valid email address.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="btnSendCode">
          <span class="btn-label">Send Reset Code</span>
          <span class="spinner"></span>
        </button>
      </form>

      <p class="center" style="margin-top:20px;">
        <a href="login.html" class="link-text">&larr; Back to Log In</a>
      </p>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const emailField = document.getElementById("inputEmail");
    const email = emailField.value.trim();

    if (!isValidEmail(email)) {
      emailField.parentElement.classList.add("has-error");
      return;
    }
    emailField.parentElement.classList.remove("has-error");

    const button = document.getElementById("btnSendCode");
    setButtonLoading(button, true, "Sending...");

    try {
      const { data: emailCheck, error: checkError } = await supabaseClient.rpc("email_exists", { check_email: email });
      if (checkError) throw checkError;

      if (!emailCheck) {
        setButtonLoading(button, false);
        document.querySelector("#btnSendCode .btn-label").textContent = "Send Reset Code";
        emailField.parentElement.classList.add("has-error");
        showToast("No account found with this email.");
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
      if (error) throw error;

      window.location.href = "reset-password.html?email=" + encodeURIComponent(email);
    } catch (err) {
      setButtonLoading(button, false);
      document.querySelector("#btnSendCode .btn-label").textContent = "Send Reset Code";
      showToast(err.message || "Something went wrong. Please try again.");
    }
  });
</script>
</body>
</html>
