<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Submissions - VoiceBox</title>
<link rel="stylesheet" href="app.css">
<style>
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--light-gray);
    margin-bottom: 24px;
  }
  .tabs button {
    flex: 1;
    background: none;
    border: none;
    padding: 14px 0 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tabs button.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .submission-item {
    background: var(--white);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 18px;
    margin-bottom: 14px;
  }
  .submission-item .row-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .submission-item .desc {
    font-size: 14px;
    color: var(--text);
    margin: 0 0 6px;
  }
  .submission-item .date {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .empty-icon {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--nav-indicator-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .empty-icon svg { width: 40px; height: 40px; fill: var(--primary); }
</style>
</head>
<body>

<div class="page">

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="logo-badge">
          <svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
        </span>
        VoiceBox
      </a>
      <div class="nav-links">
        <a href="home.html"><span class="label">Home</span></a>
        <a href="my-submissions.html" class="active"><span class="label">My Submissions</span></a>
        <a href="login.html" id="navAccountLink" class="account-link">Log In</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container narrow" style="padding-top:40px;">

      <!-- ===== Not logged in ===== -->
      <div id="notLoggedInState" class="center" style="display:none;">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"/></svg>
        </div>
        <h2 style="font-size:18px; margin-bottom:8px;">Log in to view your submissions</h2>
        <p class="text-secondary" style="margin-bottom:24px;">Your submissions are only saved to your account when you're signed in.</p>
        <a href="login.html" class="btn btn-primary btn-block">Log In / Sign Up</a>
      </div>

      <!-- ===== Logged in ===== -->
      <div id="loggedInState" style="display:none;">
        <h1 style="font-size:22px; margin-bottom:20px;">My Submissions</h1>

        <div class="tabs">
          <button id="tabComplaints" class="active" onclick="switchTab('complaint')">Complaints</button>
          <button id="tabSuggestions" onclick="switchTab('suggestion')">Suggestions</button>
        </div>

        <div id="submissionsList"></div>

        <div id="emptyState" class="center" style="display:none; padding-top:40px;">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M14,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V8L14,2z M13,9V3.5L18.5,9H13z"/></svg>
          </div>
          <p id="emptyStateTitle" style="font-weight:700; margin-bottom:6px;">No submissions yet.</p>
          <p id="emptyStateSubtitle" class="text-secondary">Your complaints will appear here.</p>
        </div>
      </div>

    </div>
    <div class="spacer-lg"></div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  let currentTab = "complaint";

  const statusLabel = {
    pending: "Pending",
    reviewed: "Reviewed",
    resolved: "Resolved"
  };

  function switchTab(type) {
    currentTab = type;
    document.getElementById("tabComplaints").classList.toggle("active", type === "complaint");
    document.getElementById("tabSuggestions").classList.toggle("active", type === "suggestion");
    loadSubmissions();
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  async function loadSubmissions() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;

    const { data, error } = await supabaseClient
      .from("submissions")
      .select("*")
      .eq("user_id", session.user.id)
      .eq("type", currentTab)
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("submissionsList");
    const emptyEl = document.getElementById("emptyState");

    if (error || !data || data.length === 0) {
      listEl.innerHTML = "";
      emptyEl.style.display = "block";
      document.getElementById("emptyStateSubtitle").textContent =
        currentTab === "complaint" ? "Your complaints will appear here." : "Your suggestions will appear here.";
      return;
    }

    emptyEl.style.display = "none";
    listEl.innerHTML = data.map(item => `
      <div class="submission-item">
        <div class="row-top">
          <p class="desc">${escapeHtml(item.description).slice(0, 120)}</p>
          <span class="status-badge status-${item.status || 'pending'}">${statusLabel[item.status] || 'Pending'}</span>
        </div>
        <div class="date">${formatDate(item.created_at)}</div>
        ${item.reply ? `<div class="divider"></div><p class="text-secondary" style="font-size:13px;"><strong>Reply:</strong> ${escapeHtml(item.reply)}</p>` : ""}
      </div>
    `).join("");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      document.getElementById("loggedInState").style.display = "block";
      document.getElementById("notLoggedInState").style.display = "none";
      loadSubmissions();
    } else {
      document.getElementById("loggedInState").style.display = "none";
      document.getElementById("notLoggedInState").style.display = "block";
    }
  }

  init();
</script>
</body>
</html>
